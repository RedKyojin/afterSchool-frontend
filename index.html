<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After School Activities App</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app">
        <h1><u>After School Classes and Activities</u></h1>

        <p>Total lessons: {{ lessons.length }}</p>

        <!-- Lesson view -->
        <h2>Lessons</h2>

        <div v-for="lesson in lessons" :key="lesson.id" class="lesson-card">
            <h3>{{ lesson.subject }}  {{ lesson.icon }}</h3>
            <p>Location: {{ lesson.location }}</p>
            <p>Price: £{{ lesson.price }}</p>
            <p>Spaces left: {{ lesson.spaces }}</p>

            <button
            @click="addToCart(lesson)"
            :disabled="lesson.spaces === 0"
            >
                Add to Cart
            </button>

    </div>
    
<script src="script.js"></script>
</body>
</html>
